# CHANGELOG.yaml – the single source of truth for the project changelog.
# nfpm (packaging/nfpm-*.yaml) reads this file to build the Debian changelog.
# Keep newest entry first.
# All timestamps must be in full ISO-8601 format.
# Fields "distribution" and "urgency" are optional per-entry; if you omit
# them, the defaults from .chglog.yml (or chglog config) are used.

- semver: 0.9.7
  date: 2026-07-15T08:30:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### Mobile User Plane (GTP-U / MUP)
        * GTP-U G-PDU decapsulation handles the optional header
          fields (sequence number, N-PDU number, next-extension-header
          flag) and a PDU Session Container extension header
          (5G N3/N9), not just the minimal 8-byte GTP header
        * BDD MUP GTP round-trip feature: a real UE ping traverses
          the GTP tunnel, with free5GC-shaped PFCP session
          establishment

    - note: |
        ### Control plane
        * L3 port routes are re-derived when kernel interface
          addresses change, keeping the eBPF FIB in sync after an
          address add/remove

- semver: 0.9.6
  date: 2026-07-14T19:15:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### eBPF data plane
        * Single-hook benchmark modes: the datapath can run
          tc-only or xdp-only (a single BPF hook) end to end, with
          a DIR-24-8 LPM FIB as the default; BDD coverage for both
          the xdp-only and tc-only single-hook paths

    - note: |
        ### SRv6 / BGP
        * BGP color steering to an SRv6 Binding SID (binding-sid
          mode) reaches the cradle eBPF FIB, proven end to end in
          BDD

    - note: |
        ### MPLS
        * MPLS TTL propagation gains a forwarded/local split with
          kernel-side propagate-local, a per-VRF TTL override, and
          ICMP tunneling (label-stack ICMP) support

- semver: 0.9.5
  date: 2026-07-13T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### SRv6
        * End.Replicate (RFC 9524 SR-P2MP): a replication-segment SID
          fans a received copy out to each downstream branch via
          `bpf_clone_redirect`, with Bud (local + downstream) support;
          driven by zebra-rs's operator `replication-segment` config
          over the new `SetReplSeg`/`DelReplSeg` gRPC

    - note: |
        ### MPLS
        * Per-LSP TTL propagation (RFC 3443 pipe / uniform mode)

    - note: |
        ### Packaging / release
        * First stable, versioned release: a `Stable Release` workflow
          (push tag `v<X.Y.Z>` matching the `version` file) builds all
          six .debs and publishes a `v<X.Y.Z>` GitHub Release for direct
          download and for ingestion into the zebra-rs APT repository, so
          `apt install zebra-rs` pulls the matching `cradle-rs` engine

- semver: 0.9.4
  date: 2026-07-12T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### BFD offload (eBPF consolidation)
        * The standalone XDP BFD Echo reflector and its in-kernel
          expiration watchdog are folded into the monolithic
          `cradle_xdp` program, resolving the single-XDP-owner attach
          conflict; cradle gains its first `bpf_timer` and BTF maps
          (DetectState, ECHO_TIMERS/CONTROL_TIMERS, OUR_LOCAL_IPS)
        * BFD detection-offload control plane: arm/disarm per-session
          detectors keyed by local discriminator, plus a `WatchBfd`
          stream reporting echo-down / detect-down back to zebra
        * The BFD Echo originator moves into the cradle control loop —
          self-addressed Echo transmit over AF_PACKET with in-kernel
          return timing, a per-egress-interface socket, and a uniform
          bootstrap echo-down for a session whose kernel timer has not
          armed yet
        * The standalone `xdp-bfd-echo` helper is retired;
          `CRADLE_XDP_MODE=skb|generic` forces generic (SKB) XDP attach
          so a veth reflects a peer's Echo regardless of the peer's XDP
          (off by default — real NICs do native XDP_TX)

    - note: |
        ### EVPN data plane
        * The standalone `tc-evpn-replicate` TC/clsact offload crates
          are removed — BUM replication is now the cradle engine's job
          (AddReplSlot toward each leaf's End.DT2M SID + `srv6_dt2u`
          decap)

    - note: |
        ### Packaging / build
        * `cap_net_raw` added to `/usr/bin/cradle`'s setcap for the
          absorbed AF_PACKET Echo originator; the `/usr/sbin/xdp-bfd-echo`
          and `tc-evpn-replicate` deb payloads and their setcaps are
          dropped
        * Cargo.lock is no longer tracked (mirrors zebra-rs)
