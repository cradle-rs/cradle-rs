# This is an example nfpm configuration file.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: "cradle-rs"
arch: "arm64"
platform: "linux"
version: "0.9.4"
section: "default"
priority: "extra"
replaces:
  - cradle-rs
provides:
  - cradle-rs
maintainer: "Kunihiro Ishiguro <kunihiro@zebra.rs>"
description: |
  cradle-rs is Kubernetes CNI plug-in and zebra-rs eBPF accelerator
homepage: "https://cradle.rs"
license: "AGPLv3"
changelog: "../CHANGELOG.yaml"
contents:
  - src: ../target/release/cradle
    dst: /usr/bin/cradle
  - src: ../target/release/cradle-cni
    dst: /usr/bin/cradle-cni
  - src: ../target/release/cradle-k8s
    dst: /usr/bin/cradle-k8s
scripts:
  # setcap on /usr/bin/cradle so a non-root supervisor (zebra-rs `system ebpf
  # enabled`) can spawn a working datapath, including the absorbed BFD Echo
  # originator (AF_PACKET → cap_net_raw).
  postinstall: ./scripts/postinstall.sh
