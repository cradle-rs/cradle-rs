name: Stable Release

# Push a tag `v<X.Y.Z>` matching the `version` file to build all six .debs and
# publish them as a `v<X.Y.Z>` GitHub Release for direct download. These stable,
# versioned assets are also what the zebra-rs release pipeline ingests into its
# per-codename APT repository, so `apt install zebra-rs` pulls the matching
# `cradle-rs` engine (zebra-rs Recommends: cradle-rs). cradle-rs itself does not
# host an APT repo — the zebra-rs pipeline owns that.
#
# Release flow:
#   1. Bump the `version` file, then `packaging/version-update.sh`
#   2. Add a CHANGELOG.yaml entry for the new version
#   3. Commit, then `git tag "v$(cat version)" && git push origin "v$(cat version)"`

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Verify tag matches version file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Tag vs version file
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(cat version)"
          echo "ref=$GITHUB_REF_NAME  tag=$tag  version-file=$ver"
          if [ "$tag" != "$ver" ]; then
            echo "::error::Release ref '$GITHUB_REF_NAME' must be tag 'v$ver' (the version file). Bump the version file first, then tag."
            exit 1
          fi

  build:
    needs: check
    uses: ./.github/workflows/build-debs.yaml
    with:
      nightly: false

  # =====================================================================
  # GitHub release v<X.Y.Z>: all six .debs for direct download
  # =====================================================================
  release:
    name: Publish Stable Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: deb-*
          merge-multiple: true

      - name: List collected .deb files
        run: ls -la artifacts/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            cradle-rs ${{ github.ref_name }}

            The eBPF data-plane engine for zebra-rs. On a zebra-rs host these
            .debs are pulled automatically via `apt install zebra-rs`
            (Recommends: cradle-rs); the table below is for direct download.

            ## Downloads

            Choose the file matching your Ubuntu version and architecture:

            | Ubuntu             | x86_64                   | ARM64                    |
            |--------------------|--------------------------|--------------------------|
            | 22.04 (jammy)      | `*-jammy_amd64.deb`      | `*-jammy_arm64.deb`      |
            | 24.04 (noble)      | `*-noble_amd64.deb`      | `*-noble_arm64.deb`      |
            | 26.04 (resolute)   | `*-resolute_amd64.deb`   | `*-resolute_arm64.deb`   |
          files: artifacts/*.deb
