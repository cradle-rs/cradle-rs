# Hubble Relay + UI on top of a cradle CNI deployment (H3 of
# docs/design/hubble.md). cradle's per-node daemon serves the Hubble Observer +
# Peer gRPC API over TCP :4244 (enable with deploy/hubble-cradle-patch.yaml).
#
#   hubble CLI / UI ──▶ hubble-relay :80 ──▶ hubble-peer :4244 ──▶ cradle pods
#
# The relay discovers nodes through the Peer service (hubble-peer) and dials
# each node's Observer to aggregate flows. All TLS is disabled here (in-cluster
# plaintext), matching the stock Cilium quick-install defaults for kind.
---
# Headless-style ClusterIP that fronts every cradle pod's Observer/Peer port.
apiVersion: v1
kind: Service
metadata:
  name: hubble-peer
  namespace: cradle-system
  labels:
    app: cradle
spec:
  selector:
    app: cradle
  ports:
  - name: peer-service
    port: 4244
    targetPort: 4244
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-relay
  namespace: cradle-system
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-relay
  namespace: cradle-system
  labels:
    app: hubble-relay
spec:
  selector:
    app: hubble-relay
  ports:
  - port: 80
    protocol: TCP
    targetPort: 4245
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-relay
  namespace: cradle-system
  labels:
    app: hubble-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-relay
  template:
    metadata:
      labels:
        app: hubble-relay
    spec:
      serviceAccountName: hubble-relay
      containers:
      - name: hubble-relay
        image: quay.io/cilium/hubble-relay:v1.19.5
        imagePullPolicy: IfNotPresent
        command:
        - hubble-relay
        args:
        - serve
        - --peer-service=hubble-peer.cradle-system.svc.cluster.local:4244
        - --listen-address=:4245
        - --disable-server-tls
        - --disable-client-tls
        ports:
        - name: grpc
          containerPort: 4245
        readinessProbe:
          tcpSocket:
            port: grpc
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hubble-ui
  namespace: cradle-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hubble-ui
rules:
- apiGroups: [""]
  resources: ["componentstatuses", "endpoints", "namespaces", "nodes", "pods", "services"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["cilium.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hubble-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hubble-ui
subjects:
- kind: ServiceAccount
  name: hubble-ui
  namespace: cradle-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hubble-ui-nginx
  namespace: cradle-system
data:
  nginx.conf: |
    server {
      listen 8081;
      listen [::]:8081;
      server_name localhost;
      root /app;
      index index.html;
      location /api {
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_pass http://127.0.0.1:8090;
      }
      location / {
        try_files $uri $uri/ /index.html /index.html;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: hubble-ui
  namespace: cradle-system
  labels:
    app: hubble-ui
spec:
  selector:
    app: hubble-ui
  ports:
  - name: http
    port: 80
    targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hubble-ui
  namespace: cradle-system
  labels:
    app: hubble-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hubble-ui
  template:
    metadata:
      labels:
        app: hubble-ui
    spec:
      serviceAccountName: hubble-ui
      containers:
      - name: frontend
        image: quay.io/cilium/hubble-ui:v0.13.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        volumeMounts:
        - name: hubble-ui-nginx-conf
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: tmp-dir
          mountPath: /tmp
      - name: backend
        image: quay.io/cilium/hubble-ui-backend:v0.13.2
        imagePullPolicy: IfNotPresent
        env:
        - name: EVENTS_SERVER_PORT
          value: "8090"
        - name: FLOWS_API_ADDR
          value: "hubble-relay.cradle-system.svc.cluster.local:80"
        ports:
        - containerPort: 8090
      volumes:
      - name: hubble-ui-nginx-conf
        configMap:
          name: hubble-ui-nginx
      - name: tmp-dir
        emptyDir: {}
