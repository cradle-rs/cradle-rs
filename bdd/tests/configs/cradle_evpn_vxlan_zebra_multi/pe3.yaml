system:
  cradle:
    enabled: true
interface:
- if-name: lo
  ipv4:
    address: 192.0.2.3/32
- if-name: pe3u
  ipv4:
    address: 10.0.13.2/24
vxlan:
- name: vxlan100
  vni: 100
  local-address: 192.0.2.3
router:
  static:
    ipv4:
      route:
      - prefix: 192.0.2.1/32
        nexthop:
        - address: 10.0.13.1
      - prefix: 192.0.2.2/32
        nexthop:
        - address: 10.0.13.1
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.3
    timer:
      adv-interval:
        ibgp: 1
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 192.0.2.1
      remote-as: 65001
      update-source: 192.0.2.3
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
    - remote-address: 192.0.2.2
      remote-as: 65001
      update-source: 192.0.2.3
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
