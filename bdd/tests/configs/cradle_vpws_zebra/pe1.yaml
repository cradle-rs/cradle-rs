system:
  cradle-grpc: "unix:/tmp/cradle_vpws_zebra_ctl1.sock"
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: pe1u
  ipv6:
    address: 2001:db8:0:12::1/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: pe1u
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC1
    afi-safi:
    - name: evpn
      vpws:
      - name: eline1
        evi: 100
        local-service-id: 101
        remote-service-id: 102
        interface: pe1c
      # VLAN-scoped E-Line sharing the SAME AC port: only 802.1Q VID 30
      # frames enter it (End.DX2V, VLAN table = the EVI); untagged frames
      # still ride eline1.
      - name: eline2
        evi: 200
        local-service-id: 201
        remote-service-id: 202
        interface: pe1c
        vlan: 30
    neighbor:
    - remote-address: 2001:db8::2
      remote-as: 65001
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
