system:
  cradle-grpc: "unix:/tmp/cradle_vpws_zebra_ctl2.sock"
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: pe2u
  ipv6:
    address: 2001:db8:0:12::2/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:2::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: pe2
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: pe2u
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.2
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC1
    afi-safi:
    - name: evpn
      vpws:
      - name: eline1
        evi: 100
        local-service-id: 102
        remote-service-id: 101
        interface: pe2c
      # Mirror of pe1's VLAN-scoped eline2 (VID 30 on the same AC).
      - name: eline2
        evi: 200
        local-service-id: 202
        remote-service-id: 201
        interface: pe2c
        vlan: 30
    neighbor:
    - remote-address: 2001:db8::1
      remote-as: 65001
      update-source: 2001:db8::2
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
