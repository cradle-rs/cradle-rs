# r — nothing but interface addresses: the un-contorted baseline. The
# connected prefixes reach cradle through the tee (interface-only
# members) and neighbors resolve via redirect_neigh-driven kernel
# ND/ARP. No static routes, no pinned neighbors, no IGP.
system:
  cradle:
    enabled: true
interface:
- if-name: ra
  ipv4:
    address: 10.0.1.254/24
  ipv6:
    address: fc00:1::ff/64
- if-name: rb
  ipv4:
    address: 10.0.2.254/24
  ipv6:
    address: fc00:2::ff/64
