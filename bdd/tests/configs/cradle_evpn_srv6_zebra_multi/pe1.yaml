system:
  cradle:
    enabled: true
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: pe1u2
  ipv6:
    address: 2001:db8:0:12::1/64
- if-name: pe1u3
  ipv6:
    address: 2001:db8:0:13::1/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
vxlan:
- name: vxlan100
  vni: 100
  local-address: 2001:db8::1
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: pe1u2
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
    - if-name: pe1u3
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC1
    afi-safi:
    - name: evpn
      advertise-all-vni: true
      encapsulation: srv6
    neighbor:
    - remote-address: 2001:db8::2
      remote-as: 65001
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
    - remote-address: 2001:db8::3
      remote-as: 65001
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
