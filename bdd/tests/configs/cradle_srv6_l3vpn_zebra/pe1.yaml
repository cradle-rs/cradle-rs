system:
  cradle:
    enabled: true
vrf:
- name: vrf-cust
  ipv4:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
  ipv6:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: pe1u
  ipv6:
    address: 2001:db8:0:12::1/64
- if-name: pe1c
  vrf: vrf-cust
  ipv4:
    address: 10.1.1.1/24
  ipv6:
    address: 2001:db8:a::1/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: pe1u
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC1
    neighbor:
    - remote-address: 2001:db8::2
      remote-as: 65001
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
      - name: vpnv6
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65001:100
      encapsulation: srv6
      afi-safi:
        ipv4:
          network:
          - prefix: 10.1.1.0/24
        ipv6:
          network:
          - prefix: 2001:db8:a::/64
