system:
  cradle-grpc: "unix:/tmp/cradle_evpn_srv6_age_ctl2.sock"
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: pe2u
  ipv6:
    address: 2001:db8:0:12::2/64
segment-routing:
  locator:
  - name: LOC2
    prefix: fcbb:bbbb:2::/48
    behavior: usid
vxlan:
- name: vxlan100
  vni: 100
  local-address: 2001:db8::2
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: pe2
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC2
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: pe2u
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.2
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC2
    afi-safi:
    - name: evpn
      advertise-all-vni: true
      encapsulation: srv6
    neighbor:
    - remote-address: 2001:db8::1
      remote-as: 65001
      update-source: 2001:db8::2
      enabled: true
      afi-safi:
      - name: evpn
        enabled: true
